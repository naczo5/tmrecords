name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install fetch dependencies
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: python -m pip install -r requirements.txt

      - name: Fetch latest records
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          UBI_EMAIL: ${{ secrets.UBI_EMAIL }}
          UBI_PASS: ${{ secrets.UBI_PASS }}
          TM_DEDI_LOGIN: ${{ secrets.TM_DEDI_LOGIN }}
          TM_DEDI_PASSWORD: ${{ secrets.TM_DEDI_PASSWORD }}
          TM_CLIENT_ID: ${{ secrets.TM_CLIENT_ID }}
          TM_CLIENT_SECRET: ${{ secrets.TM_CLIENT_SECRET }}
          TM_USER_AGENT: ${{ vars.TM_USER_AGENT }}
        run: python scripts/fetch_records.py --out site/data --previous site/data/records.json

      - name: Commit refreshed data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/records.json site/data/recent_changes.json site/data/metadata.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update Trackmania records data [skip ci]"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
